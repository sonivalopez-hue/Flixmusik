<!-- ALBUM VIEW -->
<div id="albumView" class="hidden fixed inset-0 bg-black z-40 p-4 overflow-auto pb-32">
<button onclick="closeAlbum()" class="bg-white/10 px-4 py-2 rounded-full text-sm mb-4">← Back</button>
<div class="max-w-4xl mx-auto">
<div id="albumHeader" class="bg-gradient-to-br from-[#1DB954] to-zinc-900 rounded-2xl p-6 flex gap-4 mb-6"></div>
<div id="trackList" class="space-y-2"></div>
</div>
</div>

<div id="toast" class="hidden fixed bottom-28 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full font-bold text-sm z-[70]"></div>

<script>
let db;
function openDB(){
 return new Promise((res,rej)=>{
  let req=indexedDB.open('flixmusik_v1',2);
  req.onupgradeneeded=function(e){
   let db=e.target.result;
   if(!db.objectStoreNames.contains('audios')) db.createObjectStore('audios',{keyPath:'id'});
   if(!db.objectStoreNames.contains('covers')) db.createObjectStore('covers',{keyPath:'id'});
  };
  req.onsuccess=function(e){res(e.target.result);};
  req.onerror=function(e){rej(e);};
 });
}
async function getAudioBlob(id){
 let d=await openDB();
 return new Promise(r=>{
  let tx=d.transaction('audios','readonly');
  let req=tx.objectStore('audios').get(id);
  req.onsuccess=()=>r(req.result?.blob||null);
  req.onerror=()=>r(null);
 });
}
async function getCoverBlob(id){
 let d=await openDB();
 return new Promise(r=>{
  let tx=d.transaction('covers','readonly');
  let req=tx.objectStore('covers').get(id);
  req.onsuccess=()=>r(req.result?.blob||null);
  req.onerror=()=>r(null);
 });
}

function openSub(){document.getElementById('sub').classList.remove('hidden');}
function closeSub(){document.getElementById('sub').classList.add('hidden');}
function closeAlbum(){document.getElementById('albumView').classList.add('hidden');}
function closeAudioBar(){document.getElementById('audioBar').classList.add('hidden'); document.getElementById('audio').pause();}
function openLyrics(){document.getElementById('lyricsModal').classList.remove('hidden');}
function closeLyrics(){document.getElementById('lyricsModal').classList.add('hidden');}

let settings = JSON.parse(localStorage.getItem('flixmusik_settings')||'null') || {kudaName:'FLIXMUSIK',kudaNumber:'3003350273',whatsapp:'07063226816',daily:500,weekly:2000,monthly:5000};
function applySettings(){
document.getElementById('kudaNameDisplay').innerText=settings.kudaName;
document.getElementById('kudaNumberDisplay').innerText=settings.kudaNumber;
document.getElementById('priceDisplay').innerText=`Daily ₦${settings.daily} | Weekly ₦${settings.weekly} | Monthly ₦${settings.monthly}`;
document.getElementById('heroPrice').innerText=`Daily ₦${settings.daily} | Weekly ₦${settings.weekly} | Monthly ₦${settings.monthly} - With Lyrics`;
let waNum=settings.whatsapp.replace(/[^0-9]/g,''); if(waNum.startsWith('0')) waNum='234'+waNum.slice(1);
document.getElementById('waLink').href=`https://wa.me/${waNum}?text=Hi%20I%20paid%20to%20Kuda%20${settings.kudaNumber}%20for%20FLIXMUSIK`;
}
applySettings();

let songs=JSON.parse(localStorage.getItem('flixmusik_songs')||'null')||[
{id:1,title:"Essence",artist:"Wizkid ft Tems",year:"2021",genre:"Afrobeat",type:"single",cover:"",coverId:"",audioId:"",lyrics:"You don't need no other body\nYou don't need no other body\nOnly you fi hold my body\nOnly you fi hold my body\n\nYou don't need no other body...",audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",color:"from-green-600 to-emerald-800"},
{id:2,title:"Calm Down",artist:"Rema",year:"2022",genre:"Afrobeat",type:"single",cover:"",coverId:"",audioId:"",lyrics:"Baby calm down, calm down\nGirl this your body e put my heart for lockdown...",audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",color:"from-purple-600 to-blue-600"},
];

let currentFilter='all';
let currentSong=null;
let currentTrackIndex=0;
let currentLyrics="";
let isPlaying=false;

function filterType(t){
 currentFilter=t;
 document.getElementById('fAll').className=t==='all'?'px-4 py-1.5 rounded-full text-xs bg-white text-black font-bold whitespace-nowrap':'px-4 py-1.5 rounded-full text-xs bg-white/10 whitespace-nowrap';
 document.getElementById('fSingle').className=t==='single'?'px-4 py-1.5 rounded-full text-xs bg-white text-black font-bold whitespace-nowrap':'px-4 py-1.5 rounded-full text-xs bg-white/10 whitespace-nowrap';
 document.getElementById('fAlbum').className=t==='album'?'px-4 py-1.5 rounded-full text-xs bg-white text-black font-bold whitespace-nowrap':'px-4 py-1.5 rounded-full text-xs bg-white/10 whitespace-nowrap';
 render();
}

async function render(){
let grid=document.getElementById('grid'); grid.innerHTML='';
let filtered=songs.filter(s=> currentFilter==='all' || s.type===currentFilter);
for(let s of filtered){
 let div=document.createElement('div');
 div.className='bg-[#151821] rounded-xl overflow-hidden cursor-pointer border border-white/5 hover:border-[#1DB954]/30 transition group';
 let coverUrl=s.cover||'';
 if(!coverUrl && s.coverId){
  let blob=await getCoverBlob(s.coverId);
  if(blob) coverUrl=URL.createObjectURL(blob);
 }
 let coverHtml=coverUrl?`<img src="${coverUrl}" class="w-full h-full object-cover group-hover:scale-105 transition">`:`<div class="w-full h-full bg-gradient-to-br ${s.color} flex items-center justify-center text-2xl font-black"><i class="fa fa-music"></i></div>`;
 let badge=s.type==='album'?`<span class="absolute top-2 left-2 bg-blue-600 text-[9px] px-2 py-0.5 rounded-full font-bold">ALBUM • ${s.tracks?.length||0}</span>`:`<span class="absolute top-2 left-2 bg-[#1DB954] text-[9px] px-2 py-0.5 rounded-full font-bold text-black">SINGLE • LYRICS</span>`;
 div.innerHTML=`<div class="aspect-square relative overflow-hidden bg-black">${coverHtml}${badge}<div class="absolute bottom-2 right-2 w-10 h-10 bg-[#1DB954] rounded-full flex items-center justify-center text-black opacity-0 group-hover:opacity-100 transition"><i class="fa fa-play ml-0.5"></i></div></div><div class="p-3"><p class="font-bold text-sm truncate">${s.title}</p><p class="text-xs text-white/50 truncate">${s.artist} • ${s.year}</p></div>`;
 div.onclick=()=>playSong(s);
 grid.appendChild(div);
}
}

async function playSong(s){
if(!isSub()){openSub();return;}
currentSong=s;
if(s.type==='album'){
 document.getElementById('albumView').classList.remove('hidden');
 let coverUrl=s.cover||'';
 if(!coverUrl && s.coverId){
  let blob=await getCoverBlob(s.coverId);
  if(blob) coverUrl=URL.createObjectURL(blob);
 }
 document.getElementById('albumHeader').innerHTML=`<img src="${coverUrl}" class="w-32 h-32 rounded-xl object-cover bg-zinc-800"><div><h2 class="text-2xl font-black">${s.title}</h2><p class="text-white/60">${s.artist} • ${s.year} • ${s.tracks.length} songs</p><button onclick="playTrackFromAlbum(0)" class="mt-3 bg-[#1DB954] text-black px-6 py-2 rounded-full font-bold text-sm"><i class="fa fa-play"></i> Play All</button></div>`;
 document.getElementById('trackList').innerHTML=s.tracks.map((t,i)=>`<div onclick="playTrackFromAlbum(${i})" class="flex items-center gap-3 p-3 bg-white/5 hover:bg-white/10 rounded-xl cursor-pointer"><span class="text-white/40 w-6">${i+1}</span><div class="flex-1"><p class="font-bold text-sm">${t.title}</p><p class="text-xs text-white/50">${s.artist} ${t.lyrics?'• Lyrics':''}</p></div><i class="fa fa-play text-white/40"></i></div>`).join('');
} else {
 let audioSrc=s.audio;
 if(s.audioId){
  let blob=await getAudioBlob(s.audioId);
  if(blob) audioSrc=URL.createObjectURL(blob);
 }
 let coverUrl=s.cover||'';
 if(!coverUrl && s.coverId){
  let blob=await getCoverBlob(s.coverId);
  if(blob) coverUrl=URL.createObjectURL(blob);
 }
 playAudio(audioSrc, s.title, s.artist, coverUrl, s.lyrics||'No lyrics yet');
}
}

async function playTrackFromAlbum(idx){
 currentTrackIndex=idx;
 let track=currentSong.tracks[idx];
 let audioSrc=track.audio;
 if(track.audioId){
  let blob=await getAudioBlob(track.audioId);
  if(blob) audioSrc=URL.createObjectURL(blob);
 }
 let coverUrl=currentSong.cover||'';
 if(!coverUrl && currentSong.coverId){
  let blob=await getCoverBlob(currentSong.coverId);
  if(blob) coverUrl=URL.createObjectURL(blob);
 }
 playAudio(audioSrc, track.title, currentSong.artist, coverUrl, track.lyrics||'No lyrics');
}

function playAudio(src, title, artist, cover, lyrics){
 let audio=document.getElementById('audio');
 audio.src=src;
 audio.play();
 isPlaying=true;
 currentLyrics=lyrics;
 document.getElementById('audioBar').classList.remove('hidden');
 document.getElementById('barTitle').innerText=title;
 document.getElementById('barArtist').innerText=artist;
 document.getElementById('barCover').src=cover||'';
 document.getElementById('lyricCover').src=cover||'';
 document.getElementById('lyricTitle').innerText=title;
 document.getElementById('lyricArtist').innerText=artist;
 document.getElementById('lyricText').innerText=lyrics||'No lyrics available for this track';
 document.getElementById('playBtn').innerHTML='<i class="fa fa-pause"></i>';
}

function togglePlay(){
 let audio=document.getElementById('audio');
 if(isPlaying){audio.pause(); document.getElementById('playBtn').innerHTML='<i class="fa fa-play"></i>'; isPlaying=false;}
 else {audio.play(); document.getElementById('playBtn').innerHTML='<i class="fa fa-pause"></i>'; isPlaying=true;}
}
function updateProgress(){
 let audio=document.getElementById('audio');
 let pct=(audio.currentTime/audio.duration)*100;
 document.getElementById('progress').style.width=pct+'%';
}
function seek(e){
 let audio=document.getElementById('audio');
 let rect=e.currentTarget.getBoundingClientRect();
 let x=e.clientX-rect.left;
 let pct=x/rect.width;
 audio.currentTime=audio.duration*pct;
}
function nextTrack(){
 if(currentSong && currentSong.type==='album'){
  if(currentTrackIndex < currentSong.tracks.length-1){
   playTrackFromAlbum(currentTrackIndex+1);
  }
 }
}
function isSub(){let e=localStorage.getItem('flixmusik_sub'); return e && new Date(e)>new Date();}
function toast(msg){let t=document.getElementById('toast'); t.innerText=msg; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),3000);}
function activate(){
let c=document.getElementById('code').value.toUpperCase().trim(); let days=0;
if(c=='DAILY500') days=1; else if(c=='WEEKLY2000'||c.startsWith('MUSIK-')||c.startsWith('FLIX-')) days=7; else if(c=='MONTHLY5000'||c=='MUSIKVIP') days=30;
if(days){let d=new Date(); d.setDate(d.getDate()+days); localStorage.setItem('flixmusik_sub',d.toISOString()); closeSub(); toast('Activated '+days+' days!');} else toast('Invalid code');
}
function quick(){let d=new Date(); d.setDate(d.getDate()+7); localStorage.setItem('flixmusik_sub',d.toISOString()); closeSub(); toast('Activated 7 days!');}
render();
</script>


</body></html>
